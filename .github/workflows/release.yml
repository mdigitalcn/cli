name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux)
        if: runner.os == 'Linux'
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (Linux)
        if: runner.os == 'Linux'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (macOS / Windows)
        if: runner.os != 'Linux'
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package (Unix)
        if: runner.os != 'Windows'
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NAME="mdigitalcn-v${VERSION}-${{ matrix.target }}"
          cp target/${{ matrix.target }}/release/mdigitalcn "${NAME}"
          tar czf "${NAME}.tar.gz" "${NAME}"
          shasum -a 256 "${NAME}.tar.gz" > sha256sums.txt
          echo "ASSET=${NAME}.tar.gz" >> $GITHUB_ENV

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $NAME = "mdigitalcn-v${VERSION}-${{ matrix.target }}"
          Copy-Item "target/${{ matrix.target }}/release/mdigitalcn.exe" "${NAME}.exe"
          Compress-Archive -Path "${NAME}.exe" -DestinationPath "${NAME}.zip"
          $hash = (Get-FileHash "${NAME}.zip" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${NAME}.zip" | Out-File -Append sha256sums.txt
          echo "ASSET=${NAME}.zip" | Out-File -Append $env:GITHUB_ENV

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            sha256sums.txt
          generate_release_notes: true

  universal-macos:
    name: macOS Universal
    needs: build
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin,x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2

      - run: cargo build --release --target aarch64-apple-darwin
      - run: cargo build --release --target x86_64-apple-darwin

      - name: Lipo + package
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          NAME="mdigitalcn-v${VERSION}-universal-apple-darwin"
          lipo -create -output "${NAME}" \
            target/aarch64-apple-darwin/release/mdigitalcn \
            target/x86_64-apple-darwin/release/mdigitalcn
          tar czf "${NAME}.tar.gz" "${NAME}"
          shasum -a 256 "${NAME}.tar.gz" > sha256sums.txt
          echo "ASSET=${NAME}.tar.gz" >> $GITHUB_ENV

      - uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.ASSET }}
            sha256sums.txt

  publish-crates:
    name: Publish to crates.io
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Publish
        run: cargo publish --allow-dirty
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}

  publish-npm:
    name: Publish to npm
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      - name: Set version from tag
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('./npm/package.json', 'utf8'));
            p.version = '${VERSION}';
            fs.writeFileSync('./npm/package.json', JSON.stringify(p, null, 2) + '\n');
          "

      - name: Publish
        run: npm publish --access public
        working-directory: npm
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
